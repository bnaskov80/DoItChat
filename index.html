<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Min Chattapp</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA-taggar -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3c6eb4">
  <!-- Apple-specifika taggar för "Lägg till på hemskärmen" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DoItChat">
</head>
<body>

  <div class="app-container">
    
    <header id="app-header" class="app-header">
      <!-- NYTT: Uppdelad header för avatar, titel och centrering -->
      <div id="header-left-content" class="header-avatar-container">
        <!-- Innehåll (avatar eller tillbaka-pil) renderas här av JavaScript -->
      </div>
      <!-- NYTT: Behållare för titel och medlemsantal -->
      <div class="header-channel-info">
        <h2 class="header-title"># kanalnamn</h2>
        <span class="header-member-count"></span> <!-- Fylls av JS -->
      </div>
      <div id="header-right-content" class="header-right-content"></div>
    </header>

    <!-- NYTT: Behållare för chattvyn (synlig som standard) -->
    <div id="chat-view" class="view">
      <!-- NYTT: Behållare för fäst meddelande -->
      <div id="pinned-message-container" class="hidden">
        <!-- Innehåll renderas av JavaScript -->
      </div>
      <main class="chat-feed">
        <!-- Meddelanden renderas här av JavaScript -->
      </main>
      <!-- NYTT: Knapp för att scrolla till nya meddelanden (utanför chat-feed) -->
      <button id="new-messages-indicator" class="new-messages-indicator hidden">
        <svg width="16" height="16" viewBox="0 0 256 256"><use href="icons.svg#ph-arrow-down"></use></svg>
        <span>Nya meddelanden</span>
      </button>
      <!-- NYTT: Indikator för när någon skriver -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <span id="typing-user-name"></span>
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <footer class="input-area hidden">
        <div class="input-pill">
          <input type="text" placeholder="Skriv ett meddelande...">
          <div class="type-selector-wrapper">
            <button id="type-selector-btn" class="type-selector-btn" data-value="message">
              <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
            </button>
            <div id="type-selector-dropdown" class="type-selector-dropdown hidden"></div>
          </div>
          <button class="send-btn hidden" aria-label="Skicka">
            <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-arrow-up"></use></svg>
          </button>
        </div>
      </footer>
    </div>

    <!-- NYTT: Behållare för den nya, separata trådvyn -->
    <div id="thread-view-container" class="thread-view-container hidden"></div>

    <!-- NYTT: Behållare för hemvyn (kanallista) -->
    <div id="home-view" class="view active-view"></div>

    <!-- NYTT: Behållare för profilvyn (dold som standard) -->
    <div id="profile-view" class="view hidden"></div>

    <!-- NYTT: Behållare för inställningsvyn (dold som standard) -->
    <div id="settings-view" class="view hidden"></div>

    <!-- NYTT: Navigeringsmeny i botten -->
    <nav class="nav-bar">
      <button class="nav-item active" data-view="home-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-house"></use></svg>
        <span class="nav-label">Hem</span>
      </button>
      <button class="nav-item" data-view="chat-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
        <span class="nav-label">
          Chatt
        </span>
      </button>
      <button class="nav-item" data-view="profile-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-user"></use></svg>
        <span class="nav-label">Du</span>
      </button>
    </nav>
  </div>

  <!-- NYTT: Modal/dialogruta för att bjuda in användare (dold som standard) -->
  <div id="invite-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Bjud in till kanal</h3>
        <button id="invite-modal-close-btn" class="header-action-btn" title="Stäng"><svg width="22" height="22" viewBox="0 0 256 256"><use href="icons.svg#ph-x"></use></svg></button>
      </div>
      <div id="invite-user-list" class="modal-body">
        <!-- Användarlistan renderas här av JavaScript -->
      </div>
    </div>
  </div>

  <!-- NYTT: Modal/dialogruta för att visa kanalmedlemmar (dold som standard) -->
  <div id="member-list-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Medlemmar</h3>
        <button id="member-list-close-btn" class="header-action-btn" title="Stäng"><svg width="22" height="22" viewBox="0 0 256 256"><use href="icons.svg#ph-x"></use></svg></button>
      </div>
      <div id="member-list-body" class="modal-body">
        <!-- Medlemslistan renderas här av JavaScript -->
      </div>
    </div>
  </div>

  <!-- NYTT: Modal/dialogruta för att skapa kanal -->
  <div id="create-channel-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Skapa en ny kanal</h3>
        <button id="create-channel-close-btn" class="header-action-btn" title="Stäng"><svg width="22" height="22" viewBox="0 0 256 256"><use href="icons.svg#ph-x"></use></svg></button>
      </div>
      <form id="create-channel-form" class="modal-body">
        <div class="form-group">
          <label for="channel-name-input">Namn</label>
          <input type="text" id="channel-name-input" placeholder="# t.ex. planering" required>
        </div>
        <div class="settings-item">
          <div class="settings-item-text">
            <span class="settings-item-title">Privat kanal</span>
            <span class="settings-item-description">Bara inbjudna medlemmar kan se och gå med.</span>
          </div>
          <label class="toggle-switch"><input type="checkbox" id="channel-private-toggle"><span class="slider"></span></label>
        </div>
        <button type="submit" class="primary-action-btn">Skapa kanal</button>
      </form>
    </div>
  </div>

  <!-- NYTT: Generisk dialogruta för notiser och bekräftelser -->
  <div id="generic-dialog-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="dialog-title"></h3>
        <!-- Ingen stäng-knapp här, måste använda knapparna i footern -->
      </div>
      <div class="modal-body">
        <p id="dialog-body"></p>
      </div>
      <div id="dialog-footer" class="modal-footer">
        <!-- Knappar renderas här av JavaScript -->
      </div>
    </div>
  </div>

  <!-- Ljud för inkommande meddelande -->
  <audio id="new-message-sound" src="sounds/notification.mp3" preload="auto"></audio>

  <!-- NYTT: Dold fil-input för att ladda upp profilbild -->
  <input type="file" id="avatar-upload-input" accept="image/*" style="display: none;">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<!-- NYTT: Bibliotek för drag-and-drop-funktionalitet -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<!-- Ta bort den gamla script-filen och lägg till de nya modulerna. -->
<!-- Ordningen är viktig! 'defer' ser till att de körs i rätt ordning när sidan laddats. -->
<script src="js/state.js" defer></script>
<script src="js/ui.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/events.js" defer></script>
</body>
</html>
