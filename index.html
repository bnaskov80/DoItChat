<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min Chattapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <header class="app-header">
      <!-- NYTT: Uppdelad header för avatar, titel och centrering -->
      <div id="header-left-content" class="header-avatar-container">
        <!-- Innehåll (avatar eller tillbaka-pil) renderas här av JavaScript -->
      </div>
      <!-- NYTT: Behållare för titel och medlemsantal -->
      <div class="header-channel-info">
        <h2 class="header-title"># planering-fritids</h2>
        <span class="header-member-count"></span> <!-- Fylls av JS -->
      </div>
      <div id="header-right-content" class="header-right-content"></div>
    </header>

    <!-- NYTT: Behållare för chattvyn (synlig som standard) -->
    <div id="chat-view" class="view hidden">
      <!-- NYTT: Behållare för fäst meddelande -->
      <div id="pinned-message-container" class="hidden">
        <!-- Innehåll renderas av JavaScript -->
      </div>
      <main class="chat-feed">
        <!-- Meddelanden renderas här av JavaScript -->
      </main>
      <!-- NYTT: Indikator för när någon skriver -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <span id="typing-user-name"></span>
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <footer class="input-area">
        <div class="input-pill">
          <input type="text" placeholder="Skriv ett meddelande...">
          <!-- NYTT: Anpassad dropdown-knapp för meddelandetyp -->
          <div class="type-selector-wrapper">
            <button id="type-selector-btn" class="type-selector-btn" data-value="message">
              <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
            </button>
            <div id="type-selector-dropdown" class="type-selector-dropdown hidden"></div>
          </div>
          <!-- Slut på anpassad dropdown -->
          <button class="send-btn hidden" aria-label="Skicka">
            <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-arrow-up"></use></svg>
          </button>
        </div>
      </footer>
    </div>

    <!-- NYTT: Behållare för hemvyn (kanallista) -->
    <div id="home-view" class="view active-view"></div>

    <!-- NYTT: Behållare för profilvyn (dold som standard) -->
    <div id="profile-view" class="view hidden"></div>

    <!-- NYTT: Navigeringsmeny i botten -->
    <nav class="nav-bar">
      <button class="nav-item active" data-view="home-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-house"></use></svg>
        <span class="nav-label">Hem</span>
      </button>
      <button class="nav-item" data-view="chat-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
        <span class="nav-label">
          Chatt
        </span>
      </button>
      <button class="nav-item" data-view="profile-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-user"></use></svg>
        <span class="nav-label">Du</span>
      </button>
    </nav>
  </div>

  <!-- NYTT: Modal/dialogruta för att bjuda in användare (dold som standard) -->
  <div id="invite-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Bjud in till kanal</h3>
        <button id="invite-modal-close-btn" title="Stäng">&times;</button>
      </div>
      <div id="invite-user-list" class="modal-body">
        <!-- Användarlistan renderas här av JavaScript -->
      </div>
    </div>
  </div>

  <!-- NYTT: Modal/dialogruta för att visa kanalmedlemmar (dold som standard) -->
  <div id="member-list-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Medlemmar</h3>
        <button id="member-list-close-btn" title="Stäng">&times;</button>
      </div>
      <div id="member-list-body" class="modal-body">
        <!-- Medlemslistan renderas här av JavaScript -->
      </div>
    </div>
  </div>

  <!-- Ljud för inkommande meddelande -->
  <audio id="new-message-sound" src="sounds/notification.mp3" preload="auto"></audio>

<!-- Ta bort den gamla script-filen och lägg till de nya modulerna. -->
<!-- Ordningen är viktig! 'defer' ser till att de körs i rätt ordning när sidan laddats. -->
<script src="js/state.js" defer></script>
<script src="js/ui.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/events.js" defer></script>
</body>
</html>
