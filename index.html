<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min Chattapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <header class="app-header">
      <!-- NYTT: Uppdelad header för avatar, titel och centrering -->
      <div id="header-left-content" class="header-avatar-container">
        <!-- Innehåll (avatar eller tillbaka-pil) renderas här av JavaScript -->
      </div>
      <!-- NYTT: Behållare för titel och medlemsantal -->
      <div class="header-channel-info">
        <h2 class="header-title"># planering-fritids</h2>
        <span class="header-member-count"></span> <!-- Fylls av JS -->
      </div>
      <div class="header-spacer"></div>
    </header>

    <!-- NYTT: Behållare för chattvyn (synlig som standard) -->
    <div id="chat-view" class="view active-view">
      <main class="chat-feed">
        <!-- Meddelanden renderas här av JavaScript -->
      </main>
      <!-- NYTT: Indikator för när någon skriver -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <span id="typing-user-name"></span>
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <footer class="input-area">
        <div class="input-pill">
          <input type="text" placeholder="Skriv ett meddelande...">
          <!-- NYTT: Anpassad dropdown-knapp för meddelandetyp -->
          <div class="type-selector-wrapper">
            <button id="type-selector-btn" class="type-selector-btn" data-value="message">
              <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
            </button>
            <div id="type-selector-dropdown" class="type-selector-dropdown hidden"></div>
          </div>
          <!-- Slut på anpassad dropdown -->
          <button class="send-btn hidden" aria-label="Skicka">
            <svg width="20" height="20" viewBox="0 0 256 256"><use href="icons.svg#ph-arrow-up"></use></svg>
          </button>
        </div>
      </footer>
    </div>

    <!-- NYTT: Behållare för hemvyn (kanallista) -->
    <div id="home-view" class="view hidden"></div>

    <!-- NYTT: Behållare för profilvyn (dold som standard) -->
    <div id="profile-view" class="view hidden"></div>

    <!-- NYTT: Navigeringsmeny i botten -->
    <nav class="nav-bar">
      <button class="nav-item" data-view="home-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-house"></use></svg>
        <span class="nav-label">Hem</span>
      </button>
      <button class="nav-item active" data-view="chat-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-chat"></use></svg>
        <span class="nav-label">Chatt</span>
      </button>
      <button class="nav-item" data-view="profile-view">
        <svg class="nav-icon" width="24" height="24" viewBox="0 0 256 256"><use href="icons.svg#ph-user"></use></svg>
        <span class="nav-label">Du</span>
      </button>
    </nav>
  </div>
<script src="script.js"></script>
</body>
</html>
