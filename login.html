<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Logga in - Doitchat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <!-- PWA-taggar -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a154b">
  <!-- Apple-specifika taggar för "Lägg till på hemskärmen" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DoItChat">
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <h2>Välkommen till Doitchat</h2>
    </div>
    <div id="login-container" class="login-content">
      <!-- Inloggningsvy -->
      <div id="login-view">
        <h3>Logga in</h3>
        <p>Ange din e-post och ditt lösenord för att fortsätta.</p>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">E-post</label>
            <input type="email" id="login-email" placeholder="din@epost.se" required>
          </div>
          <div class="form-group">
            <label for="login-password">Lösenord</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="login-btn">Logga in</button>
        </form>
        <button id="show-register-btn" class="toggle-form-btn">Inget konto? Registrera dig här.</button>
      </div>

      <!-- Registreringsvy (dold från start) -->
      <div id="register-view" class="hidden">
        <h3>Skapa konto</h3>
        <p>Fyll i dina uppgifter för att skapa ett nytt konto.</p>
        <form id="register-form">
          <div class="form-group">
            <label for="register-name">Ditt namn</label>
            <input type="text" id="register-name" placeholder="Ex: Bruno" required>
          </div>
          <div class="form-group">
            <label for="register-email">E-post</label>
            <input type="email" id="register-email" placeholder="din@epost.se" required>
          </div>
          <div class="form-group">
            <label for="register-password">Lösenord</label>
            <input type="password" id="register-password" placeholder="Minst 6 tecken" required>
          </div>
          <button type="submit" class="login-btn">Registrera</button>
        </form>
        <button id="show-login-btn" class="toggle-form-btn">Har du redan ett konto? Logga in.</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script>
    // Din Firebase-konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyCCNDlAiHvhzqJCICj0z-XvxT9R5BVNCOM",
      authDomain: "treado-chat.firebaseapp.com",
      projectId: "treado-chat",
      storageBucket: "treado-chat.firebasestorage.app",
      messagingSenderId: "425562964605",
      appId: "1:425562964605:web:aeb24d9173f3d13979a714",
      measurementId: "G-BYSJ1Q21KH"
    };

    // Initiera Firebase
    firebase.initializeApp(firebaseConfig);
  </script>

  <script src="js/login.js"></script>
</body>
</html>

          <label for="username">Ditt namn</label>
          <input type="text" id="username" placeholder="Ex: Bruno" required>
        </div>
        
        <button type="submit" class="login-btn">Börja chatta</button>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
